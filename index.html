<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>小提琴公式指板图</title>
    <link rel="stylesheet" href="styles.css?v=20260614-formula">
    <script src="app.js?v=20260614-formula" defer></script>
  </head>
  <body>
    <main class="app-shell">
      <section class="control-panel" aria-labelledby="app-title">
        <div class="brand-block">
          <p class="eyebrow">Violin Formula Map</p>
          <h1 id="app-title">小提琴公式指板图</h1>
        </div>

        <form class="filters" id="filters">
          <fieldset class="field-group">
            <legend>调式</legend>
            <div class="segmented mode-segmented" role="radiogroup" aria-label="调式">
              <label>
                <input type="radio" name="mode" value="major" checked>
                <span>大调</span>
              </label>
              <label>
                <input type="radio" name="mode" value="minor">
                <span>小调</span>
              </label>
            </div>
          </fieldset>

          <label class="field">
            <span>主音</span>
            <select id="tonic" name="tonic"></select>
          </label>

          <label class="field">
            <span>半音范围</span>
            <select id="range" name="range">
              <option value="12">0-12 半音</option>
              <option value="17">0-17 半音</option>
              <option value="24">0-24 半音</option>
            </select>
          </label>

          <label class="field">
            <span>有效弦长 L0</span>
            <input id="scale-length" name="scale-length" type="number" min="280" max="360" step="1" value="325" inputmode="numeric">
          </label>

          <button class="reset-button" type="button" id="reset">重置</button>
        </form>
      </section>

      <section class="result-panel" aria-live="polite">
        <div class="result-head">
          <div>
            <p class="eyebrow">Formula Diagrams</p>
            <h2 id="result-title">全部调 大调</h2>
          </div>
        </div>

        <div id="formula-note" class="formula-note"></div>
        <div id="results" class="diagram-grid"></div>
      </section>
    </main>
  </body>
</html>
